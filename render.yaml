services:
  - type: web
    name: intelligent-game-playing-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: APP_DATA_DIR
        value: /opt/render/project/src/storage
      - key: FLASK_DEBUG
        value: "0"
    disk:
      name: game-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
