<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Games Hub - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg);
            background-image: url("{{ url_for('static', filename='images/auth_background_1777459702926.png') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }
        
        .auth-container {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: min(440px, 100%);
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 24px 0;
            color: #fff;
            text-align: center;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form input, .auth-form select {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .auth-form input:focus, .auth-form select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .auth-form select { appearance: none; cursor: pointer; }
        .auth-form select option { background: var(--panel-strong); color: #fff; }

        .auth-links {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .auth-error { color: #ef4444; font-size: 0.85rem; margin: 0; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="auth-title">Create Account</h1>
        <form id="register-form" class="auth-form">
            <input type="text" id="reg-username" placeholder="Username" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <select id="reg-question" required>
                <option value="" disabled selected>Select a Security Question</option>
                <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What is your favorite book?">What is your favorite book?</option>
            </select>
            <input type="text" id="reg-answer" placeholder="Security Answer" required>
            <button type="submit" class="primary-button">Sign Up</button>
            <p id="reg-error" class="auth-error"></p>
            <div class="auth-links">
                <a href="/login" class="text-button">Already have an account? Login</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errEl = document.getElementById("reg-error");
            errEl.textContent = "";

            const username = document.getElementById("reg-username").value;
            const password = document.getElementById("reg-password").value;
            const question = document.getElementById("reg-question").value;
            const answer = document.getElementById("reg-answer").value;

            try {
                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password, security_question: question, security_answer: answer })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = "/";
                } else {
                    errEl.textContent = data.error || "Registration failed.";
                }
            } catch (err) {
                errEl.textContent = "Network error.";
            }
        });
    </script>
</body>
</html>
